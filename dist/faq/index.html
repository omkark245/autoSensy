        <p>Find answers to common questions about AutoSensy, WhatsApp automation, chatbot workflows, industry use cases, demos, and onboarding.</p>
        
        <section><h2>Common questions</h2><article><h3>What is AutoSensy?</h3><p>AutoSensy is a WhatsApp marketing automation platform for businesses that want to manage campaigns, chatbots, team inbox workflows, forms, payments, and customer follow-ups from one place.</p></article><article><h3>Is AutoSensy built for WhatsApp Business API workflows?</h3><p>Yes. AutoSensy is designed around WhatsApp-first business communication, including campaign automation, chatbot journeys, template messaging, and team response workflows.</p></article><article><h3>Who can use AutoSensy?</h3><p>AutoSensy can support ecommerce, education, real estate, finance, healthcare, travel, salons, restaurants, agencies, and service businesses that communicate with customers on WhatsApp.</p></article><article><h3>Does AutoSensy support chatbot automation?</h3><p>Yes. AutoSensy includes chatbot and flow-based automation for lead qualification, support routing, reminders, follow-ups, and customer engagement workflows.</p></article><article><h3>How can I book an AutoSensy demo?</h3><p>You can book a demo from the contact page or message the AutoSensy team directly on WhatsApp to discuss your business workflow and onboarding requirements.</p></article><article><h3>Can AutoSensy help with WhatsApp broadcast campaigns?</h3><p>Yes. AutoSensy supports WhatsApp campaign workflows for template-based broadcasts, audience follow-ups, customer reminders, and engagement campaigns.</p></article><article><h3>Does AutoSensy support team inbox workflows?</h3><p>AutoSensy is built for business teams that need organized WhatsApp conversations, faster response handling, and smoother sales or support follow-ups.</p></article><article><h3>Is AutoSensy useful for ecommerce, education, real estate, and finance teams?</h3><p>Yes. AutoSensy can support industry workflows such as order updates, student reminders, property inquiries, payment follow-ups, booking updates, and lead qualification.</p></article><article><h3>Does AutoSensy provide refunds or cancellations?</h3><p>No. AutoSensy does not provide refunds or cancellations after payment, subscription confirmation, onboarding, setup, or service confirmation.</p></article></section>
